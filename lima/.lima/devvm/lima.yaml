# devvm.yaml
# A flattened Lima VM template for aarch64 (Apple Silicon) dev environments.
# Includes: Ubuntu 24.04 LTS, Homebrew (Linuxbrew), Zsh, and Docker.
#
# Usage:
#   $ limactl start .lima/devvm/lima.yaml
#   $ limactl shell devvm

minimumLimaVersion: 2.0.0

cpus: 8
memory: 24GiB
disk: 100GiB

user:
  shell: "/usr/bin/zsh"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

mounts: []

containerd:
  system: false
  user: false

provision:
  - mode: data
    path: /etc/profile.d/99-linuxbrew.sh
    content: |
      ulimit -n 65536
      [ -e /home/linuxbrew/.linuxbrew/bin/brew ] && eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y build-essential curl git stow zsh
      # Define host.docker.internal
      sed -i 's/host.lima.internal.*/host.lima.internal host.docker.internal/' /etc/hosts

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      command -v docker >/dev/null 2>&1 && exit 0
      export DEBIAN_FRONTEND=noninteractive
      curl -fsSL https://get.docker.com | sh
      usermod -aG docker "{{.User}}"

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      [ -e /home/linuxbrew ] && exit 0
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

      DOTFILES_DIR="$HOME/.dotfiles"
      if [ ! -d "$DOTFILES_DIR" ]; then
        git clone https://github.com/willswire/dotfiles.git "$DOTFILES_DIR"
      fi

      # Remove Ubuntu defaults that conflict with stow
      rm -f "$HOME/.zshrc" "$HOME/.profile"

      # Stow all packages and install Homebrew bundle
      cd "$DOTFILES_DIR"
      stow -v -t "$HOME" */
      brew bundle install --file="$HOME/Brewfile" || true

message: |
  To run a shell:
    $ limactl shell devvm
