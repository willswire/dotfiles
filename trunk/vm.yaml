# vm.yaml
# A flattened Lima VM template for aarch64 (Apple Silicon) dev environments.
# Includes: Ubuntu 24.04 LTS, Homebrew (Linuxbrew), Zsh, and Docker.
#
# Usage:
#   $ limactl start vm.yaml
#   $ limactl shell vm
#
# When first creating this VM, once SSH is available, you can tail the status by running:
#   $ ssh lima-vm
#   $ sudo tail -f /var/log/cloud-init-output.log

minimumLimaVersion: 2.0.0

cpus: 4
memory: 8GiB
disk: 16GiB

images:
  - location: "https://cloud-images.ubuntu.com/releases/questing/release-20260226/ubuntu-25.10-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:ee462342e2f4827f9e6008bc17776ad14086c8b8971e4ac24e54bc2b92c139b8"

mounts:
  - location: "{{.Home}}/Developer/workspace"
    mountPoint: "{{.Home}}/workspace"
    writable: true

containerd:
  system: false
  user: false

provision: []

message: |
  To run a shell:
    $ limactl shell vm
